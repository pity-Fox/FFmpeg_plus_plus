name: ffmpegpp_gui
description: "FFmpeg++ Desktop — 视频处理工具"
publish_to: 'none'
version: 4.11.20+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  window_manager: ^0.4.3
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.0
  crypto: ^3.0.6
  desktop_drop: ^0.7.1
  ffi: ^2.1.3
  archive: ^4.0.9
  flutter_markdown: ^0.7.7+1

dependency_overrides:
  vector_math: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - rele/icon.png
    - rele/wx.png
    - rele/zfb.jpg
